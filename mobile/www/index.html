<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Sate</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
        font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-align: center;
        background: #ffffff;
        color: #111827;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #0b0f14; color: #e5e7eb; }
      }
      h1 { color: #16a34a; margin: 0 0 0.5rem; font-size: 1.5rem; }
      p { margin: 0.25rem 0; max-width: 30ch; }
      code { font-size: 0.85em; opacity: 0.7; }
    </style>
  </head>
  <body>
    <main>
      <h1>Sate</h1>
      <p>This app connects to your own Sate instance.</p>
      <p><code>SATE_URL</code> wasn't set when this build was made.</p>
    </main>
  </body>
</html>
