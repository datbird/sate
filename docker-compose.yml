services:
  sate:
    build: .
    # Or use a published image instead of build:
    # image: ghcr.io/datbird/sate:latest
    container_name: sate
    restart: unless-stopped
    # Bind to loopback so ONLY your auth proxy / tunnel can reach it.
    ports:
      - "127.0.0.1:8090:8080"
    environment:
      APP_ENCRYPTION_KEY: "${APP_ENCRYPTION_KEY}"
      ADMIN_EMAILS: "${ADMIN_EMAILS}"
      AUTH_EMAIL_HEADER: "${AUTH_EMAIL_HEADER:-Cf-Access-Authenticated-User-Email}"
      # SUPERUSER_EMAIL: "${SUPERUSER_EMAIL:-}"
      # SUPERUSER_PASSWORD: "${SUPERUSER_PASSWORD:-}"
    volumes:
      - ./pb_data:/pb/pb_data
